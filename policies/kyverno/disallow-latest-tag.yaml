apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
  annotations:
    policies.kyverno.io/title: Disallow Latest Tag
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Images should not use the 'latest' tag as it makes deployments
      non-deterministic and may pull untested versions. Use pinned versions
      instead.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: disallow-latest-image-tag
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: >-
          Using the 'latest' tag is disallowed. Image '{{ element.image }}'
          must use a pinned version tag or digest.
        pattern:
          spec:
            containers:
              - name: "*"
                image: "!*:latest"
