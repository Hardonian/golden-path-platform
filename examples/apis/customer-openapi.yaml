openapi: "3.0.3"
info:
  title: Customer API
  description: Customer management REST API for creating, retrieving, updating, and deleting customer accounts
  version: "1.0.0"
  contact:
    name: Team Product
    email: product@golden-path.dev
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://api.golden-path.dev/v1
    description: Production
  - url: https://api.staging.golden-path.dev/v1
    description: Staging

paths:
  /customers:
    get:
      operationId: listCustomers
      summary: List all customers
      description: Returns a paginated list of all customer accounts
      tags:
        - customers
      parameters:
        - name: limit
          in: query
          description: Maximum number of results to return
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          description: Number of results to skip for pagination
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: status
          in: query
          description: Filter customers by status
          required: false
          schema:
            type: string
            enum:
              - active
              - inactive
              - suspended
      responses:
        "200":
          description: Successfully retrieved list of customers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerListResponse"
          headers:
            X-Total-Count:
              description: Total number of customers matching the query
              schema:
                type: integer
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      operationId: createCustomer
      summary: Create a new customer
      description: Creates a new customer account with the provided details
      tags:
        - customers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerRequest"
      responses:
        "201":
          description: Customer created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Customer with this email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /customers/{customerId}:
    get:
      operationId: getCustomerById
      summary: Get a customer by ID
      description: Returns the details of a specific customer account
      tags:
        - customers
      parameters:
        - $ref: "#/components/parameters/CustomerId"
      responses:
        "200":
          description: Successfully retrieved customer details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

    put:
      operationId: updateCustomer
      summary: Update a customer
      description: Updates an existing customer account with the provided fields
      tags:
        - customers
      parameters:
        - $ref: "#/components/parameters/CustomerId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCustomerRequest"
      responses:
        "200":
          description: Customer updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: deleteCustomer
      summary: Delete a customer
      description: Soft-deletes a customer account, marking it as inactive
      tags:
        - customers
      parameters:
        - $ref: "#/components/parameters/CustomerId"
      responses:
        "204":
          description: Customer deleted successfully
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  parameters:
    CustomerId:
      name: customerId
      in: path
      required: true
      description: Unique identifier of the customer
      schema:
        type: string
        format: uuid

  schemas:
    Customer:
      type: object
      description: A customer account
      required:
        - id
        - email
        - firstName
        - lastName
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        email:
          type: string
          format: email
          description: Customer email address
          example: "alice@example.com"
        firstName:
          type: string
          description: Customer first name
          example: "Alice"
        lastName:
          type: string
          description: Customer last name
          example: "Smith"
        status:
          type: string
          enum:
            - active
            - inactive
            - suspended
          description: Account status
          example: "active"
        metadata:
          type: object
          additionalProperties: true
          description: Arbitrary metadata key-value pairs
        createdAt:
          type: string
          format: date-time
          description: ISO 8601 creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: ISO 8601 last update timestamp

    CreateCustomerRequest:
      type: object
      description: Payload for creating a new customer
      required:
        - email
        - firstName
        - lastName
      properties:
        email:
          type: string
          format: email
          description: Customer email address
          example: "alice@example.com"
        firstName:
          type: string
          description: Customer first name
          example: "Alice"
        lastName:
          type: string
          description: Customer last name
          example: "Smith"
        metadata:
          type: object
          additionalProperties: true
          description: Arbitrary metadata

    UpdateCustomerRequest:
      type: object
      description: Payload for updating an existing customer
      properties:
        email:
          type: string
          format: email
          description: Updated email address
        firstName:
          type: string
          description: Updated first name
        lastName:
          type: string
          description: Updated last name
        status:
          type: string
          enum:
            - active
            - inactive
            - suspended
          description: Updated account status
        metadata:
          type: object
          additionalProperties: true
          description: Updated metadata

    CustomerListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Customer"
        totalCount:
          type: integer
          description: Total number of customers
        hasMore:
          type: boolean
          description: Whether more results exist beyond this page

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: Machine-readable error code
            message:
              type: string
              description: Human-readable error message
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  reason:
                    type: string

  responses:
    BadRequest:
      description: Invalid request parameters or body
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication required or invalid credentials
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: The requested resource was not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from the authentication service

security:
  - bearerAuth: []
