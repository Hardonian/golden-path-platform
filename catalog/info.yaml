---
apiVersion: backstage.io/v1alpha1
kind: Location
metadata:
  name: golden-path-catalog
  namespace: default
  description: Root catalog location containing all entity definitions for the Golden Path platform
  annotations:
    backstage.io/managed-by: backstage
  labels:
    area: platform
  tags:
    - catalog
    - root
spec:
  type: file
  targets:
    # Teams
    - ./team-platform.yaml
    - ./team-product.yaml
    - ./team-security.yaml
    # Services
    - ./service-customer-api.yaml
    - ./service-billing-api.yaml
    - ./service-notification-worker.yaml
    # System
    - ./system-commerce-platform.yaml
    # Domain
    - ./domain-enterprise-platform.yaml
    # APIs
    - ./api-customer-openapi.yaml
    - ./api-billing-openapi.yaml
    # Resources
    - ./resource-postgres-cluster.yaml
    - ./resource-kafka-cluster.yaml
