---
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: new-worker-service
  title: New Worker Service
  description: Create a new background worker service with heartbeat and CI/CD
  tags:
    - worker
    - background
    - nodejs
    - service
  annotations:
    github.com/project-slug: golden-path-platform
spec:
  owner: user:scott
  type: service
  parameters:
    - title: Service Details
      required:
        - name
        - owner
        - system
        - description
      properties:
        name:
          title: Service Name
          type: string
          description: Name of the service (kebab-case)
          pattern: '^[a-z][a-z0-9-]*$'
        owner:
          title: Owner
          type: string
          description: Owner of the service (e.g. team-platform)
        system:
          title: System
          type: string
          description: System this service belongs to
        description:
          title: Description
          type: string
          description: A short description of the service
    - title: Choose a location
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Repository Location
          type: string
          description: Where the repository will be created
          ui:widget: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com
  steps:
    - id: fetch-base
      name: Fetch Base
      action: fetch:plain
      input:
        url: https://github.com/backstage/backstage/tree/master/packages/create-app/templates/default-template
    - id: template
      name: Template
      action: fetch:template
      input:
        copyWithoutRender:
          - .github/**
        values:
          component_name: ${{ parameters.name }}
          owner: ${{ parameters.owner }}
          system: ${{ parameters.system }}
          description: ${{ parameters.description }}
          entity: ${{ parameters.name }}
          entityRef: component:${{ parameters.name }}
    - id: register
      name: Register
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.fetch-base.output.remoteUrl }}
        catalogInfoPath: /catalog-info.yaml
  output:
    links:
      - title: Open in Catalog
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}
