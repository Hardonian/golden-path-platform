---
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: new-adr
  title: New Architecture Decision Record
  description: Create a new Architecture Decision Record (ADR)
  tags:
    - adr
    - architecture
    - documentation
  annotations:
    github.com/project-slug: golden-path-platform
spec:
  owner: user:scott
  type: documentation
  parameters:
    - title: ADR Details
      required:
        - title
        - status
        - owner
        - decision
        - consequences
      properties:
        title:
          title: ADR Title
          type: string
          description: Short title of the decision
        status:
          title: Status
          type: string
          description: Current status of the ADR
          enum:
            - proposed
            - accepted
            - deprecated
        owner:
          title: Owner
          type: string
          description: Author of the ADR (e.g. team-platform)
        decision:
          title: Decision
          type: string
          description: The decision that was made and why
        consequences:
          title: Consequences
          type: string
          description: What are the consequences of this decision
        number:
          title: ADR Number
          type: integer
          description: Sequential number for this ADR (e.g. 1, 2, 3)
    - title: Choose a location
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Repository Location
          type: string
          description: Where the repository will be created
          ui:widget: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com
  steps:
    - id: fetch-base
      name: Fetch Base
      action: fetch:plain
      input:
        url: https://github.com/backstage/backstage/tree/master/packages/create-app/templates/default-template
    - id: template
      name: Template
      action: fetch:template
      input:
        copyWithoutRender:
          - .github/**
        values:
          title: ${{ parameters.title }}
          status: ${{ parameters.status }}
          owner: ${{ parameters.owner }}
          decision: ${{ parameters.decision }}
          consequences: ${{ parameters.consequences }}
          number: ${{ parameters.number }}
          slug: ${{ parameters.title | lower | replace(" ", "-") | replace("[^a-z0-9-]", "") }}
          date: ${{ now | date('YYYY-MM-DD') }}
    - id: register
      name: Register
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.fetch-base.output.remoteUrl }}
        catalogInfoPath: /catalog-info.yaml
  output:
    links:
      - title: Open in Catalog
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}
