# Crossplane MessageBroker Claim - Reference Contract
# This is a reference contract, not a live resource.
# Apply with: kubectl apply -f message-broker-claim.yaml
# Requires Crossplane messaging-crossplane-provider installed.
apiVersion: messaging.crossplane.io/v1beta1
kind: Broker
metadata:
  name: app-broker
  namespace: default
  labels:
    app.kubernetes.io/part-of: golden-path-platform
spec:
  compositionSelector:
    matchLabels:
      provider: aws-sqs
      tier: standard
  parameters:
    engine: rabbitmq
    plan: standard
    connections: 100
    messageRetention: 1209600
    maxMessageSize: 262144
    deadLetterQueue:
      enabled: true
      maxReceiveCount: 5
    highAvailability: true
    tags:
      - key: Environment
        value: production
      - key: ManagedBy
        value: crossplane
  writeConnectionSecretToRef:
    name: broker-conn
    namespace: default
